<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Daraz Clone</title>
    <link rel="stylesheet" href="style.css">
    <script src="https://code.jquery.com/jquery-3.6.0.min.js"></script>
</head>
<body>

    <div class="top-yellow-bar">
        <div class="container">
            <div class="top-links">
                <span>Become a Seller</span>
                <span>Help & Support</span>
                <span>Login</span>
                <span>Sign Up</span>
            </div>
        </div>
    </div>

    <header class="main-header">
        <div class="container navbar">
            <div class="logo">Daraz</div>
            <div class="search-box">
                <input type="text" placeholder="Search in Daraz">
                <button>Search</button>
            </div>
            <div class="cart-container">
                <div class="cart-icon-css"></div>
                <span class="cart-text">Cart</span>
            </div>
        </div>
    </header>

    <main class="container">
        <section class="banners">
            <img src="Mega Deals.avif" alt="Mega Deals" class="hero-img">
            <img src="Summer sale.webp" alt="Summer Sale" class="hero-img summer-banner">
        </section>

        <h2 class="section-title">Just For You</h2>
        
        <div class="product-grid" id="product-container">
            <p>Loading deals...</p>
        </div>
    </main>

    <footer class="footer">
        <div class="container">
            <div class="footer-links">
                <span>Customer Care</span> | <span>Contact Us</span> | <span>Terms & Conditions</span>
            </div>
            <p>&copy; 2026 Daraz Online Shopping</p>
        </div>
    </footer>

    <div id="quickViewModal" class="modal">
        <div class="modal-content">
            <span class="close-btn">&times;</span>
            <h2 id="modal-title"></h2>
            <hr>
            <p id="modal-desc"></p>
            <p class="rating-box">Rating: <span id="modal-rating"></span> / 5 ⭐</p>
        </div>
    </div>

    <script>
        $(document).ready(function() {
            // Task: AJAX Integration
            $.ajax({
                url: 'https://fakestoreapi.com/products?limit=4',
                method: 'GET',
                success: function(response) {
                    const container = $('#product-container');
                    container.empty(); // Task: DOM Manipulation

                    response.forEach(product => {
                        const cardHTML = `
                            <div class="card">
                                <img src="${product.image}" alt="Product">
                                <div class="card-info">
                                    <p class="name">${product.title}</p>
                                    <p class="price">Rs. ${Math.round(product.price * 280)}</p>
                                    <button class="quick-btn" 
                                        data-title="${product.title}" 
                                        data-desc="${product.description}" 
                                        data-rate="${product.rating.rate}">
                                        Quick View
                                    </button>
                                </div>
                            </div>`;
                        container.append(cardHTML);
                    });
                }
            });

            // Task: Interaction (Modal)
            $(document).on('click', '.quick-btn', function() {
                $('#modal-title').text($(this).data('title'));
                $('#modal-desc').text($(this).data('desc'));
                $('#modal-rating').text($(this).data('rate'));
                $('#quickViewModal').fadeIn(200).css('display', 'flex');
            });

            $('.close-btn').click(function() { $('#quickViewModal').fadeOut(200); });
        });
    </script>
</body>
</html>
